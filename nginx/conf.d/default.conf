server {
    listen 80;
    server_name network-inspector.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name network-inspector.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/network-inspector.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/network-inspector.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://network-diagnostics-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

log_format json_combined escape=json
  '{"time_local":"$time_local","remote_addr":"$remote_addr","request_method":"$request_method",'
  '"status": "$status","body_bytes_sent":"$body_bytes_sent","request_time":"$request_time",'
  '"http_referrer":"$http_referer","http_user_agent":"$http_user_agent"}';

access_log /var/log/nginx/access.log json_combined;
