name: Continuous Integration
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checkout-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: './src'
          vesion-file: './pyproject.toml'
          args: 'format --check --diff'

      - name: Run mypy
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt
      - run: mypy src/

      - name: Bandit security scan
        run: bandit -r src/ -c pyproject.toml

      - name: Pip Audit for dependency vulnerabilities
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.txt

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.test
          push: false
          load: true
          tags: network-diagnostics-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in Docker
        run: |
          docker run --rm network-diagnostics-api:test

deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test, checkout-code]
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' &&
       github.event.pull_request.base.ref == 'main' &&
       contains(github.event.pull_request.labels.*.name, 'publish'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: set-tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            # CORREÇÃO: Removido o espaço antes do ${{github.sha}} e colocado um hífen
            echo "tag=v0.1.${{ github.run_number }}-${{github.sha}}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            RAW_BRANCH="${{ github.head_ref }}"
            SAFE_TAG=$(echo "$RAW_BRANCH" | sed 's/[^a-zA-Z0-9]/-/g')
            echo "tag=test-$SAFE_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_REGISTRY }}/network-diagnostics-api:${{ steps.set-tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
