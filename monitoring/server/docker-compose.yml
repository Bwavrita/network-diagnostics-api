services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./data/grafana:/var/lib/grafana
    networks:
      - monitoring-network

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/etc/prometheus
    networks:
      - monitoring-network

  alloy:
    image: grafana/alloy:latest
    restart: unless-stopped
    depends_on:
      - loki
      - tempo
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345" # Alloy UI/debug (localhost only)
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    networks:
      - monitoring-network
    volumes:
      - ./data/alloy:/var/lib/alloy
      - ./config/alloy/main.yml:/etc/alloy/config.alloy:ro

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/main.yml:/etc/loki/main.yml:ro
    command: -config.file=/etc/loki/main.yml
    networks:
      - monitoring-network

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./config/alertmanager/main.yml:/config/alertmanager.yml
      - ./data/alertmanager:/alertmanager
    networks:
      - monitoring-network
    command: --config.file=/config/alertmanager.yml --storage.path=/alertmanager
    labels:
      - com.centurylinklabs.watchtower.scope=infra
