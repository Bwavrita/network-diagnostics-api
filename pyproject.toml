[tool.ruff]
line-length = 88

target-version = "py310"

exclude = [
    ".git",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "I", "ANN", "E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.10"
strict = false
mypy_path = "app"
explicit_package_bases = true

disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
warn_return_any = true
warn_unused_ignores = true
no_implicit_optional = true

[[tool.mypy.overrides]]
module = [
    "fastapi.*",
    "uvicorn.*",
    "pytest.*",
]
ignore_missing_imports = true

[tool.bandit]
targets = ["app"]
severity = "medium"
confidence = "medium"
skips = [
    "B101",
    "B104",
]
